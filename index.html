<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8" />
  <title>自動抓圖片與 txt</title>
  <style>
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      font-family: system-ui, "Microsoft JhengHei", sans-serif;
      background: #f4f6f8;
      color: #1f2937;
    }

    main {
      width: min(760px, 92vw);
      min-height: 360px;
      border: 3px dashed #64748b;
      border-radius: 12px;
      background: white;
      text-align: center;
      padding: 32px;
      box-sizing: border-box;
    }

    button {
      margin-top: 16px;
      padding: 10px 18px;
      font-size: 16px;
      cursor: pointer;
    }

    #status {
      margin-top: 20px;
      color: #0f766e;
      white-space: pre-line;
      text-align: left;
      line-height: 1.6;
    }
  </style>
</head>
<body>
  <main>
    <h1>自動抓檔案</h1>
    <p>選來源大資料夾，掃描完成後按 Enter 輸出</p>
    <button id="selectSource">選來源資料夾</button>
    <div id="status">等待選擇資料夾...</div>
  </main>

  <script>
    const targetExtensions = new Set([
      ".jpg", ".jpeg", ".png", ".bmp", ".gif", ".tif", ".tiff", ".webp", ".txt"
    ]);

    const selectSourceBtn = document.getElementById("selectSource");
    const statusEl = document.getElementById("status");

    let collectedFiles = [];
    let totalFiles = 0;
    let totalFolders = 0;
    let extensionsSeen = new Map();
    let sampleFiles = [];

    selectSourceBtn.addEventListener("click", async () => {
      if (!window.showDirectoryPicker) {
        statusEl.textContent = "請使用 Chrome 或 Edge 開啟";
        return;
      }

      collectedFiles = [];
      totalFiles = 0;
      totalFolders = 0;
      extensionsSeen = new Map();
      sampleFiles = [];

      try {
        const sourceDir = await window.showDirectoryPicker({ mode: "read" });

        statusEl.textContent = "正在掃描資料夾...";
        await scanDirectory(sourceDir, sourceDir.name);

        showScanResult();
      } catch (error) {
        statusEl.textContent = "已取消選擇資料夾，或瀏覽器不允許讀取";
      }
    });

    window.addEventListener("keydown", async event => {
      if (event.key !== "Enter") return;

      if (collectedFiles.length === 0) {
        statusEl.textContent += "\n\n沒有符合的檔案可以輸出。";
        return;
      }

      try {
        const outputDir = await window.showDirectoryPicker({ mode: "readwrite" });

        const usedNames = new Set();
        let copied = 0;

        for (const item of collectedFiles) {
          const outputName = getUniqueName(item.file.name, usedNames);
          const fileHandle = await outputDir.getFileHandle(outputName, { create: true });
          const writable = await fileHandle.createWritable();

          await writable.write(item.file);
          await writable.close();

          copied++;
          statusEl.textContent = `已輸出 ${copied} / ${collectedFiles.length}`;
        }

        statusEl.textContent = `完成，共輸出 ${copied} 個檔案`;
      } catch (error) {
       statusEl.textContent =
    "發生錯誤：\n" +
    error.name + "\n" +
    error.message;
      }
    });

    async function scanDirectory(directoryHandle, path) {
      totalFolders++;

      for await (const entry of directoryHandle.values()) {
        const entryPath = `${path}/${entry.name}`;

        if (entry.kind === "file") {
          totalFiles++;

          const extension = getExtension(entry.name);
          extensionsSeen.set(extension || "(無副檔名)", (extensionsSeen.get(extension || "(無副檔名)") || 0) + 1);

          if (sampleFiles.length < 20) {
            sampleFiles.push(entryPath);
          }

          const file = await entry.getFile();

          if (targetExtensions.has(extension)) {
            collectedFiles.push({ file });
          }
        }

        if (entry.kind === "directory") {
          await scanDirectory(entry, entryPath);
        }
      }
    }

    function showScanResult() {
      const extensionText = [...extensionsSeen.entries()]
        .sort((a, b) => b[1] - a[1])
        .map(([ext, count]) => `${ext}: ${count}`)
        .join("\n");

      const sampleText = sampleFiles.join("\n");

      statusEl.textContent =
        `掃描完成\n` +
        `掃描資料夾數：${totalFolders}\n` +
        `掃描總檔案數：${totalFiles}\n` +
        `符合圖片/txt 檔案數：${collectedFiles.length}\n\n` +
        `看到的副檔名：\n${extensionText || "無"}\n\n` +
        `前幾個檔案：\n${sampleText || "無"}\n\n` +
        `如果符合檔案數不是 0，按 Enter 輸出`;
    }

    function getExtension(filename) {
      const index = filename.lastIndexOf(".");
      return index === -1 ? "" : filename.slice(index).toLowerCase();
    }

    function getUniqueName(filename, usedNames) {
      const index = filename.lastIndexOf(".");
      const base = index === -1 ? filename : filename.slice(0, index);
      const ext = index === -1 ? "" : filename.slice(index);

      let name = filename;
      let count = 1;

      while (usedNames.has(name)) {
        name = `${base}_${count}${ext}`;
        count++;
      }

      usedNames.add(name);
      return name;
    }
  </script>
</body>
</html>
